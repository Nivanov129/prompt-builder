<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Builder — Конструктор промптов</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f23;
  --bg2:#161630;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --surface3:rgba(255,255,255,0.1);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.12);
  --text:#e4e4e7;
  --text2:#a1a1aa;
  --text3:#71717a;
  --accent:#6366f1;
  --accent2:#818cf8;
  --accent-glow:rgba(99,102,241,0.15);
  --green:#22c55e;
  --red:#ef4444;
  --radius:12px;
  --radius-sm:8px;
  --glass:rgba(255,255,255,0.03);
  --glass-border:rgba(255,255,255,0.06);
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  line-height:1.6;
}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

/* ── Header ── */
.header{
  padding:20px 24px 0;max-width:1440px;margin:0 auto;
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.logo{
  font-size:1.4rem;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo span{font-weight:400;opacity:0.7;-webkit-text-fill-color:var(--text3);font-size:0.85rem;margin-left:8px}
.header-actions{display:flex;gap:8px;align-items:center}

/* ── Tabs ── */
.tabs{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:16px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:10px 18px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text2);cursor:pointer;font-size:0.88rem;
  transition:all 0.2s;white-space:nowrap;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.tab:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.tab.active{
  background:var(--accent-glow);color:var(--accent2);
  border-color:rgba(99,102,241,0.3);
}
.tab .tab-icon{margin-right:6px}

/* ── Main Layout ── */
.main{
  display:grid;grid-template-columns:1fr 1fr;gap:24px;
  max-width:1440px;margin:0 auto;padding:0 24px 40px;
  min-height:calc(100vh - 130px);
}

/* ── Glass Card ── */
.panel{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow);
}

/* ── Form Panel ── */
.form-panel{
  padding:24px;overflow-y:auto;max-height:calc(100vh - 150px);
}
.field{margin-bottom:20px}
.field-label{
  display:flex;align-items:center;gap:6px;
  font-size:0.8rem;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;
}
.field-label .req{color:var(--accent);font-size:0.7rem}
textarea,input[type="text"]{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);
  font-size:0.93rem;font-family:inherit;resize:vertical;
  transition:border-color 0.2s,box-shadow 0.2s;line-height:1.5;
}
textarea:focus,input[type="text"]:focus{
  outline:none;border-color:rgba(99,102,241,0.4);
  box-shadow:0 0 0 3px rgba(99,102,241,0.1);
}
textarea{min-height:80px}
textarea.task-input{min-height:120px}
.field-hint{font-size:0.75rem;color:var(--text3);margin-top:4px}

/* ── Toggle ── */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;transition:background 0.2s;
}
.toggle-row:hover{background:var(--surface2)}
.toggle-label{display:flex;flex-direction:column;gap:2px}
.toggle-label strong{font-size:0.9rem;font-weight:600}
.toggle-label small{font-size:0.75rem;color:var(--text3)}
.toggle-switch{
  width:44px;height:24px;background:var(--surface3);
  border-radius:12px;position:relative;transition:background 0.2s;
  flex-shrink:0;
}
.toggle-switch::after{
  content:'';position:absolute;top:3px;left:3px;
  width:18px;height:18px;background:#fff;border-radius:50%;
  transition:transform 0.2s;
}
.toggle-switch.on{background:var(--accent)}
.toggle-switch.on::after{transform:translateX(20px)}

/* ── Few-shot ── */
.examples-section{margin-bottom:20px}
.example-pair{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;
  position:relative;
}
.example-pair textarea{
  background:var(--bg2);border-color:var(--border);min-height:50px;
  margin-bottom:8px;font-size:0.85rem;
}
.example-pair textarea:last-of-type{margin-bottom:0}
.example-pair .ex-label{
  font-size:0.7rem;color:var(--text3);text-transform:uppercase;
  letter-spacing:0.5px;margin-bottom:4px;font-weight:600;
}
.remove-example{
  position:absolute;top:8px;right:8px;background:none;
  border:none;color:var(--text3);cursor:pointer;font-size:1.1rem;
  padding:4px;line-height:1;transition:color 0.2s;
}
.remove-example:hover{color:var(--red)}
.add-btn{
  display:flex;align-items:center;gap:6px;padding:10px 16px;
  background:var(--surface);border:1px dashed var(--border2);
  border-radius:var(--radius-sm);color:var(--text2);
  cursor:pointer;font-size:0.85rem;transition:all 0.2s;width:100%;
  justify-content:center;
}
.add-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}

/* ── Preview Panel ── */
.preview-panel{
  position:sticky;top:20px;padding:0;display:flex;flex-direction:column;
  max-height:calc(100vh - 150px);
}
.preview-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.preview-header h3{font-size:0.95rem;font-weight:600}
.preview-content{
  padding:20px;flex:1;overflow-y:auto;
  font-size:0.9rem;line-height:1.7;white-space:pre-wrap;
  color:var(--text);word-break:break-word;
}
.preview-empty{color:var(--text3);font-style:italic;text-align:center;padding-top:60px}
.char-count{font-size:0.75rem;color:var(--text3)}

/* ── Buttons ── */
.btn{
  padding:10px 18px;border-radius:var(--radius-sm);border:none;
  font-size:0.85rem;font-weight:600;cursor:pointer;
  transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;
  font-family:inherit;
}
.btn-primary{
  background:var(--accent);color:#fff;
}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-secondary{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
}
.btn-secondary:hover{background:var(--surface3)}
.btn-ghost{
  background:transparent;color:var(--text2);padding:8px 12px;
}
.btn-ghost:hover{color:var(--text);background:var(--surface)}
.btn-icon{padding:8px;font-size:1rem}

/* ── Action Bar ── */
.action-bar{
  padding:16px 20px;border-top:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0;
}
.action-bar .btn{flex:1;min-width:0;justify-content:center;font-size:0.8rem;padding:9px 10px}

.service-btns{
  display:flex;gap:6px;flex-wrap:wrap;padding:0 20px 16px;
}
.service-btns .btn{
  flex:1;min-width:0;justify-content:center;font-size:0.75rem;
  padding:8px 6px;
}
.service-btns .btn.chatgpt{background:#10a37f22;color:#10a37f;border:1px solid #10a37f33}
.service-btns .btn.chatgpt:hover{background:#10a37f33}
.service-btns .btn.claude-btn{background:rgba(99,102,241,0.12);color:var(--accent2);border:1px solid rgba(99,102,241,0.25)}
.service-btns .btn.claude-btn:hover{background:rgba(99,102,241,0.2)}
.service-btns .btn.gemini{background:#4285f422;color:#4285f4;border:1px solid #4285f433}
.service-btns .btn.gemini:hover{background:#4285f433}
.service-btns .btn.deepseek{background:#0066ff22;color:#4d94ff;border:1px solid #0066ff33}
.service-btns .btn.deepseek:hover{background:#0066ff33}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface2);border:1px solid var(--border2);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:12px 24px;border-radius:var(--radius);
  font-size:0.88rem;color:var(--text);
  box-shadow:var(--shadow);transition:transform 0.3s ease;
  z-index:999;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Mobile toggle ── */
.mobile-toggle{
  display:none;position:fixed;bottom:20px;right:20px;z-index:50;
  padding:14px 20px;border-radius:var(--radius);
  background:var(--accent);color:#fff;border:none;
  font-size:0.85rem;font-weight:600;cursor:pointer;
  box-shadow:0 4px 20px rgba(99,102,241,0.4);
}

/* ── Responsive ── */
@media(max-width:900px){
  .main{grid-template-columns:1fr;gap:16px}
  .header{padding:16px 16px 0}
  .main{padding:0 16px 100px}
  .form-panel{max-height:none}
  .preview-panel{
    position:relative;top:0;max-height:none;
    display:none;
  }
  .preview-panel.mobile-show{display:flex}
  .mobile-toggle{display:block}
  .tab{padding:8px 14px;font-size:0.82rem}
}
@media(max-width:480px){
  html{font-size:14px}
  .header-top{flex-direction:column;align-items:flex-start}
  .action-bar{flex-direction:column}
  .action-bar .btn{flex:none}
  .service-btns{flex-direction:column}
  .service-btns .btn{flex:none}
}

/* ── Animations ── */
/* ── Light Theme ── */
body.light{
  --bg:#f5f5f5;
  --bg2:#e8e8ec;
  --surface:rgba(0,0,0,0.04);
  --surface2:rgba(0,0,0,0.07);
  --surface3:rgba(0,0,0,0.1);
  --border:rgba(0,0,0,0.1);
  --border2:rgba(0,0,0,0.15);
  --text:#1a1a2e;
  --text2:#4a4a5a;
  --text3:#71717a;
  --accent:#6366f1;
  --accent2:#4f46e5;
  --accent-glow:rgba(99,102,241,0.12);
  --glass:rgba(255,255,255,0.6);
  --glass-border:rgba(0,0,0,0.08);
  --shadow:0 8px 32px rgba(0,0,0,0.1);
}
body.light ::selection{background:var(--accent);color:#fff}
body.light ::-webkit-scrollbar-thumb{background:var(--surface3)}
body.light .toggle-switch{background:var(--surface3)}
body.light .toggle-switch::after{background:#fff}
body.light .service-btns .btn.chatgpt{background:#10a37f15;border-color:#10a37f25}
body.light .service-btns .btn.claude-btn{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.18)}
body.light .service-btns .btn.gemini{background:#4285f415;border-color:#4285f425}
body.light .service-btns .btn.deepseek{background:#0066ff15;border-color:#0066ff25}

/* ── Theme Toggle Button ── */
.theme-toggle{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:8px 12px;
  color:var(--text2);cursor:pointer;font-size:0.95rem;
  transition:all 0.2s;display:inline-flex;align-items:center;
}
.theme-toggle:hover{background:var(--surface2);color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.field,.example-pair{animation:fadeIn 0.3s ease}

/* ── Preset Dropdown ── */
.preset-wrapper{position:relative;display:inline-block}
.preset-dropdown{
  position:absolute;top:100%;right:0;margin-top:6px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);min-width:280px;
  box-shadow:var(--shadow);z-index:100;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:none;
}
.preset-dropdown.open{display:block}
.preset-item{
  padding:10px 16px;cursor:pointer;font-size:0.85rem;
  color:var(--text2);transition:all 0.15s;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.preset-item:last-child{border-bottom:none}
.preset-item:hover{background:var(--surface2);color:var(--text)}
.preset-item .preset-icon{flex-shrink:0}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Prompt Builder <span>конструктор промптов</span></div>
    <div class="header-actions">
      <div class="preset-wrapper">
        <button class="btn btn-ghost" onclick="togglePresetMenu()" id="presetBtn">📦 Загрузить пресет</button>
        <div class="preset-dropdown" id="presetDropdown"></div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="Переключить тему">🌙</button>
      <button class="btn btn-ghost" onclick="resetAll()" title="Сбросить всё">↻ Сбросить</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="main">
  <!-- Form -->
  <div class="panel form-panel" id="formPanel">
    <div class="field">
      <label class="field-label">🎭 Роль <span class="req">*</span></label>
      <textarea id="role" placeholder="Кто выполняет задачу? (например: опытный SMM-специалист)" oninput="updatePreview()" style="min-height:60px"></textarea>
    </div>
    <div class="field">
      <label class="field-label">🎯 Задача <span class="req">*</span></label>
      <textarea id="task" class="task-input" placeholder="Что нужно сделать?" oninput="updatePreview()"></textarea>
    </div>
    <div class="field">
      <label class="field-label">📎 Контекст</label>
      <textarea id="context" placeholder="Вводные данные, ситуация, бэкграунд" oninput="updatePreview()"></textarea>
    </div>
    <div class="field">
      <label class="field-label">👥 Аудитория</label>
      <textarea id="audience" placeholder="Для кого результат?" oninput="updatePreview()" style="min-height:60px"></textarea>
    </div>
    <div class="field">
      <label class="field-label">📐 Формат</label>
      <textarea id="format" placeholder="Как оформить? (длина, структура, стиль)" oninput="updatePreview()" style="min-height:60px"></textarea>
    </div>
    <div class="field">
      <label class="field-label">🚫 Ограничения</label>
      <textarea id="constraints" placeholder="Чего избегать, лимиты" oninput="updatePreview()" style="min-height:60px"></textarea>
    </div>

    <!-- Chain of Thought -->
    <div class="field">
      <div class="toggle-row" onclick="toggleCoT()">
        <div class="toggle-label">
          <strong>🧠 Chain of Thought</strong>
          <small>Модель сначала анализирует, потом отвечает</small>
        </div>
        <div class="toggle-switch" id="cotToggle"></div>
      </div>
    </div>

    <!-- Few-shot -->
    <div class="examples-section">
      <label class="field-label">💡 Примеры (Few-shot)</label>
      <div id="examplesContainer"></div>
      <button class="add-btn" id="addExampleBtn" onclick="addExample()">+ Добавить пример</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="panel preview-panel" id="previewPanel">
    <div class="preview-header">
      <h3>📄 Готовый промпт</h3>
      <span class="char-count" id="charCount">0 символов</span>
    </div>
    <div class="preview-content" id="previewContent">
      <div class="preview-empty">Заполните поля слева,<br>и промпт появится здесь</div>
    </div>
    <div class="service-btns">
      <button class="btn chatgpt" onclick="openIn('chatgpt')">ChatGPT</button>
      <button class="btn claude-btn" onclick="openIn('claude')">Claude</button>
      <button class="btn gemini" onclick="openIn('gemini')">Gemini</button>
      <button class="btn deepseek" onclick="openIn('deepseek')">DeepSeek</button>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" id="copyBtn" onclick="copyPrompt()">📋 Скопировать</button>
    </div>
  </div>
</div>

<button class="mobile-toggle" id="mobileToggle" onclick="toggleMobilePreview()">📄 Превью</button>
<div class="toast" id="toast"></div>

<script>
// ── Templates ──
const templates = [
  {
    id:'text', icon:'📝', name:'Текст',
    placeholders:{
      role:'Кто пишет текст? (например: копирайтер, редактор)',
      task:'Какой текст нужно написать?',
      context:'Тема, бренд, продукт',
      audience:'Для кого текст?',
      format:'Длина, стиль, тон',
      constraints:'Чего избегать?'
    },
    preset:{
      role:'Опытный SMM-специалист и копирайтер',
      task:'Напиши пост для Telegram-канала о запуске нового продукта — мобильного приложения для управления личными финансами. Пост должен привлечь внимание, вызвать интерес и побудить скачать приложение.',
      context:'Продукт — приложение «КошелёкПро», запуск через неделю. Бесплатный тариф + премиум за 299 ₽/мес. Основные фичи: автокатегоризация расходов, умные уведомления, совместный бюджет.',
      audience:'Подписчики Telegram-канала, 22-35 лет, интересуются финансовой грамотностью',
      format:'150-200 слов. Цепляющий заголовок, основной текст с 2-3 эмодзи, призыв к действию со ссылкой. Тон: дружелюбный, не «продающий».',
      constraints:'Без кликбейта и штампов. Без агрессивных продаж и фраз вроде «уникальное предложение». Не более 3 эмодзи.'
    }
  },
  {
    id:'code', icon:'💻', name:'Код',
    placeholders:{
      role:'Какой разработчик? (например: senior Python-разработчик)',
      task:'Что нужно написать или исправить?',
      context:'Стек, фреймворк, окружение',
      audience:'Кто будет читать/использовать код?',
      format:'Язык, стиль, структура кода',
      constraints:'Ограничения и требования'
    },
    preset:{
      role:'Senior backend-разработчик, эксперт по безопасности и чистому коду',
      task:'Проведи рефакторинг функции авторизации пользователя. Текущая реализация хранит пароли в MD5, сессии в памяти, нет rate limiting. Нужно: перейти на bcrypt, добавить JWT-токены, реализовать ограничение попыток входа.',
      context:'Node.js + Express, PostgreSQL. Текущий код в файле auth.controller.js. Проект использует TypeScript. Есть существующий middleware для проверки ролей.',
      audience:'Команда из 4 разработчиков, код пойдёт в production',

      constraints:'Без внешних auth-провайдеров (всё in-house). Обратная совместимость API. Не более 150 строк основной логики.'
    }
  },
  {
    id:'analysis', icon:'📊', name:'Анализ',
    placeholders:{
      role:'Кто проводит анализ? (например: бизнес-аналитик)',
      task:'Что нужно проанализировать?',
      context:'Данные, ситуация, рынок',
      audience:'Кому адресован анализ?',
      format:'Структура отчёта, объём',
      constraints:'Ограничения, допущения'
    },
    preset:{
      role:'Бизнес-аналитик с опытом внедрения CRM-систем',
      task:'Сравни три CRM-системы: Битрикс24, AmoCRM и HubSpot. Определи лучший вариант для нашей компании по критериям: функциональность, цена, интеграции, удобство, масштабируемость.',
      context:'Компания — digital-агентство, 25 сотрудников. Основные процессы: ведение сделок, управление проектами, коммуникация с клиентами. Сейчас всё в Google Sheets. Бюджет на CRM — до 50 000 ₽/мес.',
      audience:'CEO и руководители отделов продаж и production',
      format:'Сравнительная таблица по критериям, затем детальный разбор каждой системы (плюсы/минусы), итоговая рекомендация с обоснованием.',
      constraints:'Только актуальные тарифы 2024-2025. Не учитывать бесплатные тарифы (не подходят по масштабу). Объективно, без рекламы.'
    }
  },
  {
    id:'image', icon:'🎨', name:'Изображение',
    placeholders:{
      role:'Эксперт по AI-генерации изображений',
      task:'Что нужно изобразить?',
      context:'Стиль, настроение, референсы',
      audience:'Где будет использоваться изображение?',
      format:'Разрешение, соотношение сторон, стиль',
      constraints:'Чего не должно быть на изображении?'
    },
    preset:{
      role:'Эксперт по генерации изображений с помощью AI (Midjourney, DALL-E, Flux)',
      task:'Создай детальный промпт для генерации изображения: киберпанк-город на закате. Неоновые вывески, летающие машины, дождь. Промпт на английском языке.',
      context:'Изображение для обложки sci-fi рассказа на Литрес. Стиль — кинематографичный реализм с элементами аниме. Настроение — ностальгическая меланхолия.',
      audience:'AI-модель для генерации изображений (Midjourney v6)',
      format:'Один абзац на английском. Структура: subject, environment, lighting, atmosphere, style, camera angle. Добавить технические параметры (--ar 16:9 и т.д.).',
      constraints:'Без текста и букв на изображении. Без узнаваемых брендов и копирайтных персонажей. Без людей крупным планом.'
    }
  },
  {
    id:'brainstorm', icon:'🧠', name:'Брейншторм',
    placeholders:{
      role:'Кто генерирует идеи? (например: креативный стратег)',
      task:'На какую тему нужны идеи?',
      context:'Сфера, ресурсы, текущая ситуация',
      audience:'Кто будет оценивать идеи?',
      format:'Количество идей, глубина проработки',
      constraints:'Что не подходит, бюджет, сроки'
    },
    preset:{
      role:'HR-специалист и креативный организатор корпоративных мероприятий',
      task:'Придумай 10 идей для тимбилдинга распределённой команды (часть сотрудников в офисе, часть — удалённо). Идеи должны быть необычными и реально вовлекать всех участников.',
      context:'IT-компания, 40 человек, 60% работают удалённо из разных городов. Последний тимбилдинг был полгода назад (обычный квиз — всем надоело). Есть Zoom, Miro, Slack.',
      audience:'HR-директор и тимлиды, которые выберут 2-3 активности на ближайший квартал',
      format:'Нумерованный список. Каждая идея: название, описание (2-3 предложения), формат (онлайн/гибрид), бюджет (низкий/средний/высокий), время на подготовку.',
      constraints:'Без банальных квизов и «ледоколов». Бюджет на одну активность — до 30 000 ₽. Длительность — максимум 2 часа.'
    }
  },
  {
    id:'general', icon:'📋', name:'Универсальный',
    placeholders:{
      role:'Кто выполняет задачу? (например: опытный SMM-специалист)',
      task:'Что нужно сделать?',
      context:'Вводные данные, ситуация, бэкграунд',
      audience:'Для кого результат?',
      format:'Как оформить? (длина, структура, стиль)',
      constraints:'Чего избегать, лимиты'
    },
    preset:{
      role:'HR-менеджер с опытом построения процессов в IT-компаниях',
      task:'Напиши пошаговую инструкцию по онбордингу нового сотрудника. Инструкция должна покрывать первые 30 дней: от подписания оффера до завершения испытательного срока.',
      context:'Компания — SaaS-стартап, 50 человек. Гибридный формат работы. Используем Notion, Slack, Google Workspace. Есть buddy-система, но нет формализованного чеклиста.',
      audience:'HR-команда и тимлиды, которые будут использовать инструкцию для каждого нового сотрудника',
      format:'Чеклист по дням/неделям: День 0 (до выхода), День 1, Неделя 1, Неделя 2-4. Для каждого пункта — ответственный и дедлайн.',
      constraints:'Без воды и общих фраз. Конкретные действия, а не «познакомить с командой». Учитывать удалённых сотрудников.'
    }
  }
];

const fieldIds = ['role','task','context','audience','format','constraints'];
let cotEnabled = false;
let exampleCount = 0;
let currentTemplate = 'general';

// ── Init ──
function init() {
  renderTabs();
  applyTemplate('general');
  renderPresetDropdown();
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = templates.map(t =>
    `<button class="tab${t.id === currentTemplate ? ' active' : ''}" onclick="applyTemplate('${t.id}')">
      <span class="tab-icon">${t.icon}</span>${t.name}
    </button>`
  ).join('');
}

function applyTemplate(id) {
  currentTemplate = id;
  const t = templates.find(x => x.id === id);
  if (!t) return;
  fieldIds.forEach(f => {
    document.getElementById(f).placeholder = t.placeholders[f];
  });
  renderTabs();
  renderPresetDropdown();
}

// ── Preset dropdown ──
function renderPresetDropdown() {
  const dd = document.getElementById('presetDropdown');
  dd.innerHTML = templates.map(t =>
    `<div class="preset-item" onclick="loadPreset('${t.id}')">
      <span class="preset-icon">${t.icon}</span>
      <span>${t.name}: ${getPresetDescription(t.id)}</span>
    </div>`
  ).join('');
}

function getPresetDescription(id) {
  const descs = {
    text: 'пост в Telegram о запуске продукта',
    code: 'рефакторинг функции авторизации',
    analysis: 'сравнение трёх CRM-систем',
    image: 'киберпанк-город на закате',
    brainstorm: 'идеи для тимбилдинга',
    general: 'инструкция по онбордингу'
  };
  return descs[id] || '';
}

function togglePresetMenu() {
  const dd = document.getElementById('presetDropdown');
  dd.classList.toggle('open');
}

function loadPreset(id) {
  const t = templates.find(x => x.id === id);
  if (!t) return;
  // Switch to the template tab
  applyTemplate(id);
  // Fill fields with preset content
  fieldIds.forEach(f => {
    document.getElementById(f).value = t.preset[f];
  });
  // Close dropdown
  document.getElementById('presetDropdown').classList.remove('open');
  updatePreview();
}

// Close preset dropdown on outside click
document.addEventListener('click', function(e) {
  const wrapper = document.querySelector('.preset-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('presetDropdown').classList.remove('open');
  }
});

// ── CoT ──
function toggleCoT() {
  cotEnabled = !cotEnabled;
  document.getElementById('cotToggle').classList.toggle('on', cotEnabled);
  updatePreview();
}

// ── Few-shot ──
function addExample() {
  const current = document.querySelectorAll('.example-pair').length;
  if (current >= 3) return;
  exampleCount++;
  const id = exampleCount;
  const div = document.createElement('div');
  div.className = 'example-pair';
  div.id = `ex-${id}`;
  div.innerHTML = `
    <button class="remove-example" onclick="removeExample(${id})" title="Удалить">×</button>
    <div class="ex-label">Вход (пример ${current + 1})</div>
    <textarea placeholder="Пример входных данных..." oninput="updatePreview()"></textarea>
    <div class="ex-label" style="margin-top:8px">Выход (пример ${current + 1})</div>
    <textarea placeholder="Ожидаемый результат..." oninput="updatePreview()"></textarea>
  `;
  document.getElementById('examplesContainer').appendChild(div);
  updateAddBtn();
  updatePreview();
}

function updateAddBtn() {
  const btn = document.getElementById('addExampleBtn');
  const current = document.querySelectorAll('.example-pair').length;
  btn.style.display = current >= 3 ? 'none' : 'flex';
}

function removeExample(id) {
  const el = document.getElementById(`ex-${id}`);
  if (el) el.remove();
  updateAddBtn();
  updatePreview();
}

// ── Build Prompt ──
function buildPrompt() {
  const role = document.getElementById('role').value.trim();
  const task = document.getElementById('task').value.trim();
  const context = document.getElementById('context').value.trim();
  const audience = document.getElementById('audience').value.trim();
  const format = document.getElementById('format').value.trim();
  const constraints = document.getElementById('constraints').value.trim();

  if (!role && !task) return '';

  let parts = [];

  if (role) parts.push(`Ты — ${role}.`);
  if (task) parts.push(`\n${task}`);
  if (context) parts.push(`\nКонтекст: ${context}`);
  if (audience) parts.push(`Аудитория: ${audience}`);
  if (format) parts.push(`Формат: ${format}`);
  if (constraints) parts.push(`Ограничения: ${constraints}`);

  if (cotEnabled) {
    parts.push('\nСначала проанализируй задачу шаг за шагом, затем дай финальный результат.');
  }

  // Examples
  const exPairs = document.querySelectorAll('.example-pair');
  if (exPairs.length > 0) {
    let exText = '\nПримеры:';
    let hasContent = false;
    exPairs.forEach((pair, i) => {
      const textareas = pair.querySelectorAll('textarea');
      const inp = textareas[0]?.value.trim();
      const out = textareas[1]?.value.trim();
      if (inp || out) {
        hasContent = true;
        if (inp) exText += `\nВход: ${inp}`;
        if (out) exText += `\nВыход: ${out}`;
        if (i < exPairs.length - 1) exText += '';
      }
    });
    if (hasContent) parts.push(exText);
  }

  return parts.join('\n');
}

// ── Preview ──
function updatePreview() {
  const prompt = buildPrompt();
  const container = document.getElementById('previewContent');
  const counter = document.getElementById('charCount');

  if (!prompt) {
    container.innerHTML = '<div class="preview-empty">Заполните поля слева,<br>и промпт появится здесь</div>';
    counter.textContent = '0 символов';
    return;
  }

  container.textContent = prompt;
  const len = prompt.length;
  const words = prompt.split(/\s+/).filter(Boolean).length;
  counter.textContent = `${len} симв. · ${words} слов`;
}

// ── Copy ──
function copyPrompt() {
  const prompt = buildPrompt();
  if (!prompt) return showToast('Промпт пуст — заполните поля');
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(prompt).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Скопировано';
    setTimeout(() => { btn.textContent = original; }, 2000);
  });
}

// ── Open In ──
function openIn(service) {
  const prompt = buildPrompt();
  if (!prompt) return showToast('Сначала создайте промпт');
  navigator.clipboard.writeText(prompt).then(() => {
    showToast('Промпт скопирован — вставьте в чат');
    const urls = {
      chatgpt: 'https://chat.openai.com/',
      claude: 'https://claude.ai/new',
      gemini: 'https://gemini.google.com/',
      deepseek: 'https://chat.deepseek.com/'
    };
    setTimeout(() => window.open(urls[service], '_blank'), 300);
  });
}

// ── Reset ──
function resetAll() {
  fieldIds.forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('examplesContainer').innerHTML = '';
  exampleCount = 0;
  cotEnabled = false;
  document.getElementById('cotToggle').classList.remove('on');
  updateAddBtn();
  updatePreview();
  showToast('Форма очищена');
}

// ── Mobile toggle ──
function toggleMobilePreview() {
  const panel = document.getElementById('previewPanel');
  const btn = document.getElementById('mobileToggle');
  panel.classList.toggle('mobile-show');
  if (panel.classList.contains('mobile-show')) {
    btn.textContent = '✏️ Редактор';
    panel.scrollIntoView({ behavior: 'smooth' });
  } else {
    btn.textContent = '📄 Превью';
  }
}

// ── Toast ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Theme ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

function loadTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

// Start
loadTheme();
init();
</script>
